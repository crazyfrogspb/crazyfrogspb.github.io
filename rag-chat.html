---
layout: default
title: RAG-чат
---

<style>
        /* Плавная прокрутка к якорям */
        html {
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
            font-weight: 300;
        }

        .header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1.1em;
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
        }

        .message.assistant .message-avatar {
            background: #764ba2;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            position: relative;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .sources {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .sources h4 {
            margin: 0 0 10px 0;
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .source-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        /* Подсветка источника при переходе по якорной ссылке */
        .source-item:target {
            background: #f0f4ff;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .source-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .source-title a {
            color: #667eea;
            text-decoration: none;
            transition: all 0.2s;
        }

        .source-title a:hover {
            color: #5a6fd8;
            text-decoration: underline;
        }

        .source-content {
            color: #666;
            line-height: 1.4;
        }

        /* Стили для сгруппированных источников */
        .source-post {
            background: #f9f9f9;
            border-left: 3px solid #667eea;
        }

        .source-header {
            margin-bottom: 0.5em;
        }

        .fragment-count {
            color: #666;
            font-size: 0.85em;
            font-weight: normal;
            margin-left: 0.5em;
        }

        .fragments {
            list-style: none;
            margin: 0.5em 0 0 1em;
            padding: 0;
        }

        .fragment {
            margin-bottom: 0.5em;
            color: #555;
        }

        .fragment strong {
            color: #667eea;
            font-size: 0.9em;
        }

        .fragment small {
            color: #666;
            font-size: 0.85em;
        }

        .fragment-preview {
            margin-top: 0.5em;
            color: #666;
            font-size: 0.85em;
            font-style: italic;
            padding-left: 1em;
            border-left: 2px solid #ddd;
        }

        .input-container {
            padding: 20px;
            background: #f8f9fa;
        }

        .input-box {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            min-height: 50px;
            max-height: 120px;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: #667eea;
        }

        .send-button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-button:hover:not(:disabled) {
            background: #5a6fd8;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            padding: 10px 20px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .status.loading {
            color: #667eea;
        }

        .status.error {
            color: #dc3545;
            background: #f8d7da;
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            color: #666;
            font-style: italic;
        }

        .typing-indicator.show {
            display: block;
        }

        .welcome-message {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>RAG-чат</h1>
            <p>Здесь можно задать вопросы по постам из канала Варим-МЛ</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                Привет! Задавайте вопросы об ML, ИИ-инструментах, карьере, авторе канала.
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            Ищу информацию и готовлю ответ...
        </div>

        <div class="input-container">
            <div class="input-box">
                <textarea id="messageInput" class="input-field" placeholder="Загрузка модели..."
                    rows="1" disabled></textarea>
                <button id="sendButton" class="send-button" disabled>
                    ➤
                </button>
            </div>
        </div>

        <div class="status" id="status">
            Инициализация RAG-системы...
        </div>
    </div>

    <script src="/assets/js/vector-search.js"></script>
    <script>
        class RAGChat {
            constructor() {
                this.vectorSearch = new VectorSearch();
                this.chatContainer = document.getElementById('chatContainer');
                this.messageInput = document.getElementById('messageInput');
                this.sendButton = document.getElementById('sendButton');
                this.statusElement = document.getElementById('status');
                this.typingIndicator = document.getElementById('typingIndicator');

                this.cloudflareWorkerUrl = 'https://varim-ml-rag-proxy.crazyfrogspb-rag.workers.dev/chat';

                // История чата для контекста (последние N сообщений)
                this.chatHistory = [];
                this.maxHistoryLength = 6; // Последние 3 пары вопрос-ответ

                this.initializeEventListeners();
                this.initialize();
            }

            initializeEventListeners() {
                this.sendButton.addEventListener('click', () => this.sendMessage());
                this.messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                // Auto-resize textarea
                this.messageInput.addEventListener('input', () => {
                    this.messageInput.style.height = 'auto';
                    this.messageInput.style.height = this.messageInput.scrollHeight + 'px';
                });
            }

            async initialize() {
                try {
                    // Блокируем ввод до завершения инициализации
                    this.disableInput();

                    this.showStatus('Загружаем RAG-данные...', 'loading');
                    await this.vectorSearch.loadData();

                    this.showStatus('Инициализируем эмбеддинг-модель...', 'loading');
                    await this.vectorSearch.initializeWorker();

                    this.showStatus('RAG-система готова к работе!');
                    setTimeout(() => this.hideStatus(), 2000);

                    // Разблокируем ввод после успешной инициализации
                    this.enableInput();

                } catch (error) {
                    console.error('Ошибка инициализации:', error);
                    this.showStatus('Ошибка инициализации RAG-системы', 'error');
                    // Ввод остается заблокированным при ошибке
                }
            }

            async sendMessage() {
                const message = this.messageInput.value.trim();
                if (!message) return;

                // Добавляем сообщение пользователя в UI
                this.addMessage(message, 'user');
                this.messageInput.value = '';
                this.messageInput.style.height = 'auto';

                // Показываем индикатор печати
                this.showTyping();
                this.disableInput();

                try {
                    // Если есть история - переформулируем запрос для лучшего поиска
                    let searchQuery = message;
                    if (this.chatHistory.length > 0) {
                        searchQuery = await this.rephraseQuery(message, this.chatHistory);
                        console.log('🔄 Переформулированный запрос для поиска:', searchQuery);
                    }

                    // Выполняем поиск (по переформулированному запросу если есть история)
                    const searchResults = await this.vectorSearch.search(searchQuery, {
                        limit: 7,
                        threshold: 0.1
                    });

                    // Генерируем ответ через LLM (с оригинальным запросом и историей)
                    const response = await this.generateLLMResponse(message, searchResults.chunks, this.chatHistory);

                    // Извлекаем номера процитированных источников из ответа
                    const citedNumbers = this.extractCitedSources(response.answer);

                    // Фильтруем sources - показываем только те, которые процитированы в ответе
                    const citedSources = citedNumbers.length > 0
                        ? citedNumbers
                            .map(num => searchResults.chunks[num - 1]) // num - 1 потому что нумерация с 1, а индексы с 0
                            .filter(chunk => chunk !== undefined) // Убираем undefined если номер вне диапазона
                        : []; // Если нет цитат - не показываем источники

                    // Группируем источники по постам для UI
                    const groupedSources = citedSources.length > 0
                        ? this.groupSourcesByPost(citedSources, citedNumbers)
                        : [];

                    // Перенумеровываем ссылки в тексте (старые номера → новые после фильтрации)
                    const renumberedAnswer = this.renumberCitations(response.answer, citedNumbers);

                    // Добавляем ответ ассистента с сгруппированными источниками
                    this.addMessage(renumberedAnswer, 'assistant', groupedSources);

                    // Добавляем сообщения в историю чата для следующих запросов
                    this.chatHistory.push(
                        { role: 'user', content: message },
                        { role: 'assistant', content: response.answer }
                    );

                    // Ограничиваем длину истории (последние N сообщений)
                    if (this.chatHistory.length > this.maxHistoryLength) {
                        this.chatHistory = this.chatHistory.slice(-this.maxHistoryLength);
                    }

                } catch (error) {
                    console.error('Ошибка обработки сообщения:', error);
                    // Показываем реальное сообщение об ошибке от сервера
                    const errorMessage = error.message || 'Извините, произошла ошибка при обработке запроса. Попробуйте еще раз.';
                    this.addMessage(errorMessage, 'assistant');
                } finally {
                    this.hideTyping();
                    this.enableInput();
                }
            }

            /**
             * Переформулирует запрос в standalone вопрос с учетом истории
             */
            async rephraseQuery(query, chatHistory) {
                try {
                    const response = await fetch(this.cloudflareWorkerUrl.replace('/chat', '/rephrase'), {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            query: query,
                            history: chatHistory
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        console.warn('Ошибка переформулирования, используем оригинальный запрос');
                        return query;
                    }

                    return data.rephrased_query || query;

                } catch (error) {
                    console.warn('Ошибка переформулирования:', error);
                    return query; // Fallback к оригинальному запросу
                }
            }

            async generateLLMResponse(query, chunks, chatHistory = []) {
                // Группируем чанки по постам для более структурированного контекста
                const groupedChunks = this.groupChunksForLLM(chunks);

                // Форматируем сгруппированный контекст
                const context = this.formatGroupedContextForLLM(groupedChunks);

                // Отладка: показываем что отправляем в LLM
                console.log('📤 Отправка в LLM:', {
                    query: query,
                    chunksCount: chunks.length,
                    contextLength: context.length,
                    historyLength: chatHistory.length,
                    chunks: chunks.map((chunk, i) => ({
                        index: i + 1,
                        title: chunk.post_title,
                        contentLength: chunk.content.length,
                        contentPreview: chunk.content.substring(0, 100) + '...',
                        score: chunk.score?.toFixed(4),
                        bm25Score: chunk.bm25Score?.toFixed(4),
                        semanticScore: chunk.semanticScore?.toFixed(4)
                    }))
                });
                console.log('📝 Полный контекст для LLM:', context);
                console.log('💬 История чата:', chatHistory);

                const response = await fetch(this.cloudflareWorkerUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        context: context,
                        history: chatHistory,
                        model: 'openrouter/free'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Если есть сообщение об ошибке от сервера, используем его
                    const errorMessage = data.message || data.error || `HTTP ${response.status}: ${response.statusText}`;
                    throw new Error(errorMessage);
                }

                return data;
            }

            addMessage(content, sender, sources = null) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = sender === 'user' ? 'Вы' : '🤖';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                // Конвертируем markdown ссылки в HTML для assistant сообщений
                if (sender === 'assistant') {
                    const htmlContent = this.markdownToHtml(content);
                    contentDiv.innerHTML = htmlContent;
                } else {
                    contentDiv.textContent = content;
                }

                // Добавляем источники для ответов ассистента
                if (sender === 'assistant' && sources && sources.length > 0) {
                    const sourcesDiv = document.createElement('div');
                    sourcesDiv.className = 'sources';

                    const sourcesTitle = document.createElement('h4');
                    sourcesTitle.textContent = 'Источники:';
                    sourcesDiv.appendChild(sourcesTitle);

                    // sources теперь сгруппированы по постам
                    sources.forEach((post, index) => {
                        const sourceItem = document.createElement('div');
                        sourceItem.className = 'source-item source-post';
                        sourceItem.id = `source-${index + 1}`; // ID для якорных ссылок

                        // Заголовок поста с ссылкой
                        const sourceHeader = document.createElement('div');
                        sourceHeader.className = 'source-header';

                        const sourceTitle = document.createElement('div');
                        sourceTitle.className = 'source-title';

                        // Создаем кликабельную ссылку на пост
                        const link = document.createElement('a');
                        link.href = post.url;
                        link.textContent = post.title;
                        link.target = '_blank';
                        sourceTitle.appendChild(link);

                        // Добавляем информацию о количестве фрагментов
                        const fragmentCount = document.createElement('span');
                        fragmentCount.className = 'fragment-count';
                        const fragmentWord = post.chunks.length === 1
                            ? 'фрагмент'
                            : post.chunks.length < 5
                                ? 'фрагмента'
                                : 'фрагментов';
                        const citedNumbersStr = post.citedNumbers
                            .map(n => `[${n}]`)
                            .join(', ');
                        fragmentCount.textContent = ` (${post.chunks.length} ${fragmentWord}: ${citedNumbersStr})`;

                        sourceHeader.appendChild(sourceTitle);
                        sourceHeader.appendChild(fragmentCount);
                        sourceItem.appendChild(sourceHeader);

                        // Если больше одного фрагмента - показываем список
                        if (post.chunks.length > 1) {
                            const fragmentsList = document.createElement('ul');
                            fragmentsList.className = 'fragments';

                            post.chunks.forEach(chunk => {
                                const fragmentItem = document.createElement('li');
                                fragmentItem.className = 'fragment';

                                const fragmentNumber = document.createElement('strong');
                                fragmentNumber.textContent = `[${chunk.originalNumber}]`;

                                const fragmentContent = document.createElement('small');
                                const preview = chunk.content.substring(0, 100) + '...';
                                fragmentContent.textContent = `: ${preview}`;

                                fragmentItem.appendChild(fragmentNumber);
                                fragmentItem.appendChild(fragmentContent);
                                fragmentsList.appendChild(fragmentItem);
                            });

                            sourceItem.appendChild(fragmentsList);
                        } else {
                            // Один фрагмент - показываем превью inline
                            const fragmentPreview = document.createElement('div');
                            fragmentPreview.className = 'fragment-preview';
                            const preview = post.chunks[0].content.substring(0, 150) + '...';
                            fragmentPreview.textContent = preview;
                            sourceItem.appendChild(fragmentPreview);
                        }

                        sourcesDiv.appendChild(sourceItem);
                    });

                    contentDiv.appendChild(sourcesDiv);
                }

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);

                // Удаляем welcome message если есть
                const welcomeMessage = this.chatContainer.querySelector('.welcome-message');
                if (welcomeMessage) {
                    welcomeMessage.remove();
                }

                this.chatContainer.appendChild(messageDiv);
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
            }

            showTyping() {
                this.typingIndicator.classList.add('show');
            }

            hideTyping() {
                this.typingIndicator.classList.remove('show');
            }

            disableInput() {
                this.messageInput.disabled = true;
                this.sendButton.disabled = true;
            }

            enableInput() {
                this.messageInput.disabled = false;
                this.sendButton.disabled = false;
                this.messageInput.placeholder = 'Напечатай свой вопрос тут...';
                this.messageInput.focus();
            }

            showStatus(message, type = '') {
                this.statusElement.textContent = message;
                this.statusElement.className = `status ${type}`;
                this.statusElement.style.display = 'block';
            }

            hideStatus() {
                this.statusElement.style.display = 'none';
            }

            /**
             * Извлекает номера процитированных источников из текста
             * Находит все ссылки вида [1], [2], [1, 5] и возвращает уникальные номера
             */
            extractCitedSources(text) {
                const citedNumbers = new Set();

                // Ищем все паттерны вида [1], [2, 3], [1, 5, 7] и т.д.
                const regex = /\[([\d,\s]+)\]/g;
                let match;

                while ((match = regex.exec(text)) !== null) {
                    const numbers = match[1];
                    // Проверяем что это действительно список чисел
                    if (/^[\d,\s]+$/.test(numbers)) {
                        // Извлекаем каждое число
                        const nums = numbers.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
                        nums.forEach(num => citedNumbers.add(num));
                    }
                }

                return Array.from(citedNumbers).sort((a, b) => a - b);
            }

            /**
             * Перенумеровывает ссылки на источники в тексте
             * Например: если процитированы [3, 6], заменяет [3] → [1], [6] → [2]
             * @param {string} text - Текст с оригинальными номерами источников
             * @param {Array<number>} citedNumbers - Отсортированный массив процитированных номеров
             * @returns {string} Текст с перенумерованными ссылками
             */
            renumberCitations(text, citedNumbers) {
                if (citedNumbers.length === 0) {
                    return text;
                }

                // Создаем мапинг: старый номер → новый номер
                const mapping = {};
                citedNumbers.forEach((oldNum, index) => {
                    mapping[oldNum] = index + 1; // Новая нумерация с 1
                });

                // Заменяем все ссылки на источники
                let result = text;

                // Обрабатываем все паттерны вида [числа]
                result = result.replace(/\[([\d,\s]+)\]/g, (match, numbers) => {
                    // Проверяем что это список чисел
                    if (!/^[\d,\s]+$/.test(numbers)) {
                        return match; // Не трогаем если это не числа
                    }

                    // Парсим номера
                    const nums = numbers.split(',')
                        .map(n => parseInt(n.trim()))
                        .filter(n => !isNaN(n));

                    // Заменяем каждый номер на новый
                    const newNums = nums
                        .map(num => mapping[num])
                        .filter(num => num !== undefined); // Убираем неупомянутые

                    // Формируем новую ссылку
                    if (newNums.length === 0) {
                        return ''; // Удаляем ссылку если все номера были отфильтрованы
                    }

                    return `[${newNums.join(', ')}]`;
                });

                return result;
            }

            /**
             * Группирует чанки по постам для подачи в LLM
             * Сохраняет релевантность: сортирует группы по макс. score
             */
            groupChunksForLLM(chunks) {
                const postGroups = {};

                // Группируем по post_url
                chunks.forEach((chunk) => {
                    const postUrl = chunk.post_url;

                    if (!postGroups[postUrl]) {
                        postGroups[postUrl] = {
                            title: chunk.post_title,
                            url: postUrl,
                            chunks: [],
                            maxScore: 0
                        };
                    }

                    postGroups[postUrl].chunks.push({
                        content: chunk.content,
                        score: chunk.score || 0
                    });

                    // Обновляем максимальный score для сортировки групп
                    postGroups[postUrl].maxScore = Math.max(
                        postGroups[postUrl].maxScore,
                        chunk.score || 0
                    );
                });

                // Преобразуем в массив и сортируем группы по макс. score
                const grouped = Object.values(postGroups)
                    .sort((a, b) => b.maxScore - a.maxScore);

                // Сортируем фрагменты внутри каждого поста по score
                grouped.forEach(post => {
                    post.chunks.sort((a, b) => b.score - a.score);
                });

                return grouped;
            }

            /**
             * Форматирует сгруппированный контекст для LLM
             * Формат: [N] Название поста (K фрагментов) \n • Фрагмент 1 \n • Фрагмент 2
             */
            formatGroupedContextForLLM(groupedChunks) {
                let context = "Контекст из постов блога (отсортировано по релевантности):\n\n";

                groupedChunks.forEach((post, index) => {
                    const fragmentWord = post.chunks.length === 1
                        ? 'фрагмент'
                        : post.chunks.length < 5
                            ? 'фрагмента'
                            : 'фрагментов';

                    context += `[${index + 1}] ${post.title}`;

                    if (post.chunks.length > 1) {
                        context += ` (${post.chunks.length} ${fragmentWord})`;
                    }

                    context += '\n';

                    // Добавляем содержимое фрагментов
                    post.chunks.forEach(chunk => {
                        context += `   • ${chunk.content}\n`;
                    });

                    context += '\n';
                });

                return context;
            }

            /**
             * Группирует процитированные источники по постам для UI
             * Сохраняет оригинальные номера цитирования
             */
            groupSourcesByPost(citedSources, citedNumbers) {
                const postGroups = {};

                // Группируем по post_url
                citedSources.forEach((chunk, index) => {
                    const postUrl = chunk.post_url;
                    const originalNumber = citedNumbers[index];

                    if (!postGroups[postUrl]) {
                        postGroups[postUrl] = {
                            title: chunk.post_title,
                            url: postUrl,
                            citedNumbers: [],
                            chunks: []
                        };
                    }

                    postGroups[postUrl].citedNumbers.push(originalNumber);
                    postGroups[postUrl].chunks.push({
                        content: chunk.content,
                        originalNumber: originalNumber,
                        chunk_index: chunk.chunk_index
                    });
                });

                // Преобразуем в массив и сортируем по первому цитированию
                return Object.values(postGroups).sort((a, b) =>
                    Math.min(...a.citedNumbers) - Math.min(...b.citedNumbers)
                );
            }

            /**
             * Конвертирует простой markdown в HTML
             * Поддерживает: ссылки [text](url), ссылки на источники [1] или [1, 5], жирный **text**, курсив *text*, переносы строк
             */
            markdownToHtml(markdown) {
                let html = markdown;

                // Экранируем HTML теги для безопасности
                html = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');

                // Конвертируем markdown ссылки [text](url) в HTML (должно быть ДО конвертации числовых ссылок)
                html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: #667eea; text-decoration: underline;">$1</a>');

                // Конвертируем списки источников [1, 5] или [1, 2, 3]
                html = html.replace(/\[([\d,\s]+)\]/g, (match, numbers) => {
                    // Проверяем, что это действительно список чисел (может быть запятые и пробелы)
                    if (/^[\d,\s]+$/.test(numbers)) {
                        const nums = numbers.split(',').map(n => n.trim()).filter(n => n);
                        const links = nums.map(num =>
                            `<a href="#source-${num}" style="color: #667eea; text-decoration: underline; cursor: pointer;"><span class="source-ref" data-source="${num}">${num}</span></a>`
                        );
                        return '[' + links.join(', ') + ']';
                    }
                    return match; // Не подходит, оставляем как есть
                });

                // Жирный текст **text**
                html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

                // Курсив *text*
                html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

                // Переносы строк
                html = html.replace(/\n/g, '<br>');

                return html;
            }
        }

        // Инициализируем чат
        document.addEventListener('DOMContentLoaded', () => {
            new RAGChat();
        });
    </script>
